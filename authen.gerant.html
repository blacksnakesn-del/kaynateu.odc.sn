
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kay Nateu - Authentification Gérant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="authenti">
    <div class="auth-card">
        <div class="card-header">
            <h2 class="logo-small">Kay Nateu</h2>
        </div>
        <div class="card-body">
            <img src="./images/gerant.jpg" alt="Icône Gérant" class="auth-icon">
            <p class="auth-role">Gérant</p>
            <p class="form-instruction">Veillez remplir le formulaire pour une Authentification</p>
            
            <!-- Le formulaire redirige vers le tableau de bord du Gérant une fois soumis -->
            <form action="dashboard.gerant.html" method="GET">
                <div class="form-group">
                    <input type="text" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Prénom" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Mots de passe" required>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" id="terms">
                    <label for="terms">Accepter termes & conditions</label>
                </div>
                <button type="submit">S’authentifier</button>
            </form>
        </div>
    </div>
</body>
</html>

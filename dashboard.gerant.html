
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kay Nateu - Dashboard Gérant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Barre de navigation du Dashboard -->
    <nav class="dash-nav">
        <div class="logo-small">Kay Nateu</div>
        <div class="user-info">Gérant 👤</div>
    </nav>

    <div class="dash-container">
        <!-- Liens du menu du haut comme sur ta maquette (Mois, Paiement, Lancer Campagne...) -->
        <div class="dash-menu">
            <button class="active">Dashboard</button>
            <button>Paiement</button>
            <button>Lancer Campagne</button>
            <button>Gestion</button>
        </div>

        <!-- Contenu principal : La table des utilisateurs -->
        <main class="dash-content">
            <h3>Mois : Janvier</h3>
            <table>
                <thead>
                    <tr>
                        <th>Utilisateurs</th>
                        <th>Total : XXXXX Ffa</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>Abdou Salam</td><td>5000</td></tr>
                    <tr><td>Alou Sall</td><td>7000</td></tr>
                    <tr><td>Aminata Sow</td><td>5000</td></tr>
                    <!-- Répète les lignes ici selon tes besoins -->
                </tbody>
            </table>
        </main>
    </div>

</body>
</html>

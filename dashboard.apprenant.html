
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kay Nateu - Dashboard Apprenant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <nav class="dash-nav">
        <div class="logo-small">Kay Nateu</div>
        <div class="user-info">Apprenant 👤</div>
    </nav>

    <div class="dash-container">
        <!-- Menu du haut spécifique à l'apprenant -->
        <div class="dash-menu-apprenant">
            <button class="active">Mon Compte</button>
            <button>Historique</button>
            <button>Notification</button>
        </div>

        <main class="dash-content-apprenant">
            <!-- Encadré supérieur "Mes Informations" de la maquette -->
            <div class="info-section-apprenant">
                <div class="info-bubble">Mes Informations</div>
            </div>

            <!-- Section Suivi & Transactions -->
            <div class="transactions-section">
                <div class="section-title-bubble">Suivis/Paiements</div>
                
                <div class="transaction-list">
                    <div class="transaction-item"><span>$mois</span></div>
                    <div class="transaction-item"><span>$mois</span></div>
                    <div class="transaction-item"><span>$mois</span></div>
                    <div class="transaction-item"><span>$mois</span></div>
                    <div class="transaction-item"><span>$Campagne</span></div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
